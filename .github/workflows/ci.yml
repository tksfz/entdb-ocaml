name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Run tests
        run: nix develop -c dune runtest

      - name: Build portable binary
        run: nix build .#default

      - name: Smoke test portable binary
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y libsqlite3-0 libev4
          ./result/bin/entdb --help

  ci-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v30

      - name: Run tests
        run: nix develop -c dune runtest

      - name: Build binary
        run: nix build .#default

      - name: Smoke test binary
        run: |
          brew install sqlite libev
          if otool -L ./result/bin/entdb | grep -F /nix/store; then
            echo "Binary still references Nix store paths" >&2
            exit 1
          fi
          ./result/bin/entdb --help
